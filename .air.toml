root = "."
tmp_dir = "tmp/air"

[build]
  cmd = "go build -o ./tmp/air/javinizer-dev ./cmd/javinizer"
  bin = "./tmp/air/javinizer-dev"
  full_bin = "./tmp/air/javinizer-dev api"
  include_ext = ["go", "yaml", "yml", "json", "toml"]
  exclude_dir = ["tmp", "bin", "web/frontend/node_modules", "web/frontend/build", ".git", "docs"]
  exclude_regex = ["_test.go"]
  delay = 500
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
